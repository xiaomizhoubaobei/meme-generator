version: '3.8'

services:
  meme-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meme-generator
    ports:
      - "8080:8080"
    volumes:
      - ./data/memes:/data/memes
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - LOAD_BUILTIN_MEMES=true
      - MEME_DIRS=["/data/memes"]
      - MEME_DISABLED_LIST=[]
      - GIF_MAX_SIZE=10.0
      - GIF_MAX_FRAMES=100
      - LOG_LEVEL=INFO
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - meme-network

networks:
  meme-network:
    driver: bridge

volumes:
  meme-data:
    driver: local