version: '3.8'

services:
  meme-generator-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: meme-generator-dev
    ports:
      - "2233:2233"
      - "9229:9229"
    volumes:
      - ./src:/app/src:ro
      - ./resources:/app/resources:ro
      - ./data/memes:/data/memes
      - ./logs:/app/logs
      - /app/node_modules
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=development
      - LOAD_BUILTIN_MEMES=true
      - MEME_DIRS=["/data/memes"]
      - MEME_DISABLED_LIST=[]
      - GIF_MAX_SIZE=10.0
      - GIF_MAX_FRAMES=100
      - LOG_LEVEL=DEBUG
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=2233
    command: npm run dev:api
    restart: unless-stopped
    networks:
      - meme-network

networks:
  meme-network:
    driver: bridge