name: Docker 镜像构建与推送

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Dockerfile"
      - "package*.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 加固运行器（审计所有出站调用）
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: 从 package.json 提取版本号
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "已提取版本: $VERSION"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: 登录 DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录 GitHub 容器注册表
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录阿里云容器注册表
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: crpi-wk2d8umombj539de.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 提取依赖版本
        id: deps
        run: |
          NODE_VERSION=$(node -p "require('./package.json').engines.node.replace('>=', '')")
          TYPESCRIPT_VERSION=$(node -p "require('./package.json').devDependencies.typescript.replace('^', '')")
          EXPRESS_VERSION=$(node -p "require('./package.json').dependencies.express.replace('^', '')")
          SHARP_VERSION=$(node -p "require('./package.json').dependencies.sharp.replace('^', '')")
          echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "TYPESCRIPT_VERSION=$TYPESCRIPT_VERSION" >> $GITHUB_OUTPUT
          echo "EXPRESS_VERSION=$EXPRESS_VERSION" >> $GITHUB_OUTPUT
          echo "SHARP_VERSION=$SHARP_VERSION" >> $GITHUB_OUTPUT
          echo "Node: $NODE_VERSION, TypeScript: $TYPESCRIPT_VERSION, Express: $EXPRESS_VERSION, Sharp: $SHARP_VERSION"

      - name: Docker 元数据（主流容器注册表）
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/meme-generator
            ghcr.io/${{ github.repository }}/meme-generator
            crpi-wk2d8umombj539de.cn-shanghai.personal.cr.aliyuncs.com/xmz-1/meme-generator
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送（主流容器注册表，支持 OCI）
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=用于制作趣味图片的Node.js API服务
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.title=Meme Generator
            org.opencontainers.image.maintainer=祁筱欣
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=xiaomizhoubaobei
            org.opencontainers.image.authors=qixiaoxin@stu.sqxy.edu.cn
            build.url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            dependencies.node=${{ steps.deps.outputs.NODE_VERSION }}
            org.opencontainers.image.typescript=${{ steps.deps.outputs.TYPESCRIPT_VERSION }}
            org.opencontainers.image.express=${{ steps.deps.outputs.EXPRESS_VERSION }}
            org.opencontainers.image.sharp=${{ steps.deps.outputs.SHARP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: 安装 cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: 使用 cosign 签名镜像（无密钥模式）
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          echo "使用 cosign 无密钥模式签名镜像..."
          while IFS= read -r tag; do
              if [[ "$tag" == *"crpi-"* ]]; then
                  echo "跳过阿里云 ACR 镜像: $tag"
                  continue
              fi
              echo "正在签名 $tag"
              cosign sign --yes "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: 证明 DockerHub 镜像
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/meme-generator
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: 证明 GHCR 镜像
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/${{ github.repository }}/meme-generator
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

