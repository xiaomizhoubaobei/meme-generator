name: Docker 镜像构建与推送 (华为云 SWR)

on:
  workflow_run:
    workflows: ["Docker 镜像构建与推送"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-push-swr-amd64:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: 加固运行器（审计所有出站调用）
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: 从 pyproject.toml 提取版本号
        id: version
        run: |
          VERSION=$(grep '^version =' pyproject.toml | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "已提取版本: $VERSION"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: 登录华为云 SWR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: swr.cn-east-3.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: 提取依赖版本
        id: deps
        run: |
          PYTHON_VERSION=$(grep '^python = ' pyproject.toml | cut -d'"' -f2 | sed 's/\^//')
          HTTPX_VERSION=$(grep 'httpx = ' pyproject.toml | cut -d'"' -f2 | sed 's/[>=,<>].*//')
          FASTAPI_VERSION=$(grep 'fastapi = ' pyproject.toml | cut -d'"' -f2 | sed 's/[>=,<>].*//')
          PILLOW_VERSION=$(grep 'Pillow = ' pyproject.toml | cut -d'"' -f2 | sed 's/[>=,<>].*//')
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "HTTPX_VERSION=$HTTPX_VERSION" >> $GITHUB_OUTPUT
          echo "FASTAPI_VERSION=$FASTAPI_VERSION" >> $GITHUB_OUTPUT
          echo "PILLOW_VERSION=$PILLOW_VERSION" >> $GITHUB_OUTPUT
          echo "Python: $PYTHON_VERSION, httpx: $HTTPX_VERSION, fastapi: $FASTAPI_VERSION, Pillow: $PILLOW_VERSION"

      - name: 构建并推送（华为云 SWR，amd64 平台）
        id: build-swr-amd64
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }}-amd64
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest-amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=用于制作趣味图片的 Python API 服务
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.title=Meme Generator
            org.opencontainers.image.maintainer=祁筱欣
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=xiaomizhoubaobei
            org.opencontainers.image.authors=qixiaoxin@stu.sqxy.edu.cn
            build.url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            dependencies.python=${{ steps.deps.outputs.PYTHON_VERSION }}
            org.opencontainers.image.httpx=${{ steps.deps.outputs.HTTPX_VERSION }}
            org.opencontainers.image.fastapi=${{ steps.deps.outputs.FASTAPI_VERSION }}
            org.opencontainers.image.pillow=${{ steps.deps.outputs.PILLOW_VERSION }}

  build-and-push-swr-arm64:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: 加固运行器（审计所有出站调用）
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: 从 pyproject.toml 提取版本号
        id: version
        run: |
          VERSION=$(grep '^version =' pyproject.toml | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "已提取版本: $VERSION"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: 登录华为云 SWR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: swr.cn-east-3.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: 提取依赖版本
        id: deps
        run: |
          PYTHON_VERSION=$(grep '^python = ' pyproject.toml | cut -d'"' -f2 | sed 's/\^//')
          HTTPX_VERSION=$(grep 'httpx = ' pyproject.toml | cut -d'"' -f2 | sed 's/[>=,<>].*//')
          FASTAPI_VERSION=$(grep 'fastapi = ' pyproject.toml | cut -d'"' -f2 | sed 's/[>=,<>].*//')
          PILLOW_VERSION=$(grep 'Pillow = ' pyproject.toml | cut -d'"' -f2 | sed 's/[>=,<>].*//')
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "HTTPX_VERSION=$HTTPX_VERSION" >> $GITHUB_OUTPUT
          echo "FASTAPI_VERSION=$FASTAPI_VERSION" >> $GITHUB_OUTPUT
          echo "PILLOW_VERSION=$PILLOW_VERSION" >> $GITHUB_OUTPUT
          echo "Python: $PYTHON_VERSION, httpx: $HTTPX_VERSION, fastapi: $FASTAPI_VERSION, Pillow: $PILLOW_VERSION"

      - name: 构建并推送（华为云 SWR，arm64 平台）
        id: build-swr-arm64
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }}-arm64
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest-arm64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=用于制作趣味图片的 Python API 服务
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.title=Meme Generator
            org.opencontainers.image.maintainer=祁筱欣
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=xiaomizhoubaobei
            org.opencontainers.image.authors=qixiaoxin@stu.sqxy.edu.cn
            build.url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            dependencies.python=${{ steps.deps.outputs.PYTHON_VERSION }}
            org.opencontainers.image.httpx=${{ steps.deps.outputs.HTTPX_VERSION }}
            org.opencontainers.image.fastapi=${{ steps.deps.outputs.FASTAPI_VERSION }}
            org.opencontainers.image.pillow=${{ steps.deps.outputs.PILLOW_VERSION }}

  create-and-push-manifest:
    runs-on: ubuntu-latest
    needs: [build-and-push-swr-amd64, build-and-push-swr-arm64]
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: 加固运行器（审计所有出站调用）
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: 登录华为云 SWR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: swr.cn-east-3.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: 检出代码
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: 从 pyproject.toml 提取版本号
        id: version
        run: |
          VERSION=$(grep '^version =' pyproject.toml | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "已提取版本: $VERSION"

      - name: 创建多架构 manifest（版本号）
        run: |
          docker manifest create --amend --insecure \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }} \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }}-amd64 \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }}-arm64

      - name: 标注 manifest 架构信息（版本号）
        run: |
          docker manifest annotate \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }} \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }}-amd64 \
            --arch amd64
          docker manifest annotate \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }} \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }}-arm64 \
            --arch arm64

      - name: 推送多架构 manifest（版本号）
        run: |
          docker manifest push swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:${{ steps.version.outputs.VERSION }}

      - name: 创建多架构 manifest（latest）
        run: |
          docker manifest create --amend --insecure \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest-amd64 \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest-arm64

      - name: 标注 manifest 架构信息（latest）
        run: |
          docker manifest annotate \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest-amd64 \
            --arch amd64
          docker manifest annotate \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest \
            swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest-arm64 \
            --arch arm64

      - name: 推送多架构 manifest（latest）
        run: |
          docker manifest push swr.cn-east-3.myhuaweicloud.com/qixiaoxin/meme-generator:latest